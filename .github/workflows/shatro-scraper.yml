name: Shatro Planning & EPC Scraper

on:
  schedule:
    # Runs hourly 06:00–11:00 UTC; shatro_planning_v2.py checks the actual
    # Europe/London local time itself and only acts at 9am (scrape) or
    # 10am (digest) local time — this keeps it correct across BST/GMT
    # without needing to edit the cron when the clocks change.
    - cron: '0 6-11 * * *'
    # EPC register changes far less often than planning applications —
    # once a week (Monday 06:30 UTC) is plenty.
    - cron: '30 6 * * 1'
  workflow_dispatch: {}   # lets you trigger a run manually from the Actions tab

jobs:
  planning:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    if: github.event.schedule == '0 6-11 * * *' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests beautifulsoup4
      - name: Run planning scraper (auto mode — self-gates to 9am/10am London time)
        env:
          MONDAY_API_TOKEN: ${{ secrets.MONDAY_API_TOKEN }}
          MONDAY_BOARD_ID: ${{ secrets.MONDAY_BOARD_ID }}
          PLANWIRE_KEY: ${{ secrets.PLANWIRE_KEY }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: python Shatro_Planning_V2.py --mode=auto

  epc:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: github.event.schedule == '30 6 * * 1' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests
      - name: Run EPC scanner
        env:
          MONDAY_API_TOKEN: ${{ secrets.MONDAY_API_TOKEN }}
          EPC_BOARD_ID: ${{ secrets.EPC_BOARD_ID }}
          EPC_API_EMAIL: ${{ secrets.EPC_API_EMAIL }}
          EPC_API_KEY: ${{ secrets.EPC_API_KEY }}
        run: python shatro_epc_scan.py
