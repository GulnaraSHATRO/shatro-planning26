name: Shatro Planning & EPC Scraper

permissions:
  contents: write

on:
  schedule:
    # Once daily. GitHub doesn't guarantee this fires at exactly 09:00 —
    # on a low-activity repo it can drift by a while — but the script now
    # does scrape+digest together in one go whenever it actually runs,
    # so drift no longer means a wasted no-op day.
    - cron: '0 9 * * *'
    # EPC register changes far less often than planning applications —
    # once a week (Monday) is plenty.
    - cron: '30 6 * * 1'
  workflow_dispatch:
    inputs:
      job:
        description: 'Which job to run manually'
        required: false
        default: 'both'
        type: choice
        options:
          - both
          - planning
          - epc

jobs:
  planning:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    if: github.event.schedule == '0 9 * * *' || (github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'both' || github.event.inputs.job == 'planning'))
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests beautifulsoup4
      - name: Run planning scraper (auto mode — self-gates to 9am/10am London time)
        env:
          MONDAY_API_TOKEN: ${{ secrets.MONDAY_API_TOKEN }}
          MONDAY_BOARD_ID: ${{ secrets.MONDAY_BOARD_ID }}
          PLANWIRE_KEY: ${{ secrets.PLANWIRE_KEY }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: python Shatro_Planning_V2.py --mode=auto

  epc:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: github.event.schedule == '30 6 * * 1' || (github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'both' || github.event.inputs.job == 'epc'))
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests
      - name: Run EPC scanner
        env:
          MONDAY_API_TOKEN: ${{ secrets.MONDAY_API_TOKEN }}
          EPC_BOARD_ID: ${{ secrets.EPC_BOARD_ID }}
          EPC_API_EMAIL: ${{ secrets.EPC_API_EMAIL }}
          EPC_API_KEY: ${{ secrets.EPC_API_KEY }}
        run: python shatro_epc_scan.py
      - name: Commit diagnostic log (Monday-independent channel)
        if: always()
        run: |
          if [ -f last_run_log.txt ]; then
            git config user.name "shatro-bot"
            git config user.email "bot@shatro.uk"
            git add last_run_log.txt
            git diff --staged --quiet || git commit -m "chore: update EPC scanner diagnostic log [skip ci]"
            git push
          fi
